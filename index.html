<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main>
    <section class="top-area">
      <div class="hero-wrap">
        <section class="hero" data-node-id="9013:4158">
          <p class="eyebrow">Our pricing</p>
          <h1>Everything your restaurant needs to sell more.</h1>
          <p class="subhead">Online ordering, marketing, loyalty, and analytics in one place.</p>

          <div class="mobile-location-switch" aria-label="Location mode" data-location="single">
            <span class="switch-thumb" aria-hidden="true"></span>
            <button class="pill active" type="button" data-location="single">Single location</button>
            <button class="pill" type="button" data-location="multi">Multi-location (Chain)</button>
          </div>
        </section>
      </div>
    </section>

    <div class="tabs-sticky-sentinel" aria-hidden="true"></div>
    <section class="top-tabs" data-node-id="9013:4164">
      <div class="tabs-wrap">
        <div class="tabs-left">
          <button class="tab active" type="button" data-location-tab="single">Single location</button>
          <button class="tab" type="button" data-location-tab="multi">Multi-location (Chain)</button>
        </div>
        <div class="tabs-right">
          <button class="tab active" type="button" data-period="monthly">Monthly</button>
          <button class="tab" type="button" data-period="month12">12 months</button>
          <button class="tab" type="button" data-period="month24">24 months</button>
        </div>
      </div>
    </section>

    <section class="page">
      <section class="pricing" aria-label="Pricing plans">
        <div class="chain-info" id="chainInfo"></div>
        <div class="desktop-pricing" id="desktopPricing"></div>
        <div class="mobile-pricing" id="mobilePricing"></div>
      </section>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
